<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #e8f4fd;
      --mint: #d4f0e8;
      --peach: #fde8d8;
      --lavender: #ede8fd;
      --cream: #fffdf8;
      --text: #2c3e50;
      --text-soft: #7f8c8d;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --radius: 24px;
    }

    body {
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #e8f4fd 0%, #d4f5ee 40%, #fde8f5 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 24px 16px 40px;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(180,230,255,0.5), transparent 70%);
      top: -100px; right: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(200,255,220,0.4), transparent 70%);
      bottom: -80px; left: -80px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Greeting */
    .greeting {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }
    .greeting h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .greeting p {
      color: var(--text-soft);
      font-size: 0.85rem;
      margin-top: 4px;
      font-weight: 300;
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.9);
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.20s; }

    .card-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    /* Clock */
    .clock-card { background: linear-gradient(135deg, rgba(232,244,253,0.9), rgba(255,255,255,0.85)); }
    .clock-time {
      font-family: 'DM Serif Display', serif;
      font-size: 4rem;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
    }
    .clock-time span { color: #a0c4e8; }
    .clock-date {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--text-soft);
      font-weight: 300;
    }
    .clock-weekday {
      display: inline-block;
      background: #e8f4fd;
      color: #4a90c4;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-left: 8px;
    }

    /* Weather */
    .weather-card { background: linear-gradient(135deg, rgba(212,240,232,0.9), rgba(255,255,255,0.85)); }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .weather-icon { font-size: 3rem; line-height: 1; }
    .weather-temp {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      line-height: 1;
      color: var(--text);
    }
    .weather-temp sup { font-size: 1.2rem; font-family: 'DM Sans', sans-serif; color: var(--text-soft); }
    .weather-info { flex: 1; }
    .weather-desc { font-size: 1rem; color: var(--text); font-weight: 500; margin-top: 2px; }
    .weather-meta { font-size: 0.8rem; color: var(--text-soft); margin-top: 6px; }
    .weather-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-top: 12px;
    }
    .weather-loading { color: var(--text-soft); font-size: 0.9rem; }
    .weather-error { color: #e07070; font-size: 0.85rem; }

    /* Calendar */
    .calendar-card { background: linear-gradient(135deg, rgba(255,240,250,0.9), rgba(255,255,255,0.85)); }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cal-nav {
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .cal-nav:hover { background: rgba(0,0,0,0.05); }
    .cal-title { font-weight: 500; font-size: 0.95rem; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }
    .cal-dow {
      font-size: 0.65rem;
      color: var(--text-soft);
      font-weight: 500;
      text-transform: uppercase;
      padding: 2px 0 6px;
    }
    .cal-day {
      font-size: 0.82rem;
      padding: 6px 2px;
      border-radius: 50%;
      cursor: default;
      transition: background 0.15s;
      color: var(--text);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day.empty { opacity: 0; pointer-events: none; }
    .cal-day.today {
      background: #4a90c4;
      color: white;
      font-weight: 500;
    }
    .cal-day.sunday { color: #e07070; }
    .cal-day.saturday { color: #e07070; }

    /* Countdown */
    .countdown-card { background: linear-gradient(135deg, rgba(237,232,253,0.9), rgba(255,255,255,0.85)); }
    .countdown-setup { display: flex; flex-direction: column; gap: 10px; }
    .countdown-setup input[type="text"],
    .countdown-setup input[type="date"] {
      border: 1.5px solid rgba(150,130,220,0.3);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: rgba(255,255,255,0.7);
      outline: none;
      transition: border-color 0.2s;
    }
    .countdown-setup input:focus { border-color: #9b84e0; }
    .countdown-btn {
      background: linear-gradient(135deg, #9b84e0, #b8a0e8);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .countdown-btn:hover { opacity: 0.85; }
    .countdown-display { text-align: center; }
    .countdown-name { font-size: 1rem; color: var(--text); font-weight: 500; margin-bottom: 16px; }
    .countdown-numbers {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .cnt-unit { text-align: center; }
    .cnt-val {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: var(--text);
      line-height: 1;
      display: block;
    }
    .cnt-label {
      font-size: 0.65rem;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .cnt-sep {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #c0b0e8;
      align-self: flex-start;
      padding-top: 2px;
    }
    .countdown-done { font-size: 1.2rem; color: #9b84e0; }
    .countdown-reset {
      margin-top: 14px;
      background: none;
      border: 1.5px solid rgba(150,130,220,0.4);
      border-radius: 10px;
      padding: 6px 16px;
      font-size: 0.78rem;
      color: var(--text-soft);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .countdown-reset:hover { background: rgba(150,130,220,0.1); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="greeting" id="greeting">
    <h1 id="greetText">你好 👋</h1>
    <p>今天也是美好的一天</p>
  </div>

  <!-- Clock -->
  <div class="card clock-card">
    <div class="card-label">现在时间</div>
    <div class="clock-time" id="clockTime">00<span>:</span>00<span>:</span>00</div>
    <div class="clock-date" id="clockDate">
      <span id="clockDateText"></span>
      <span class="clock-weekday" id="clockWeekday"></span>
    </div>
  </div>

  <!-- Weather -->
  <div class="card weather-card">
    <div class="card-label">今日天气</div>
    <div id="weatherContent">
      <div class="weather-loading">📡 正在获取天气...</div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="card calendar-card">
    <div class="card-label">日历</div>
    <div class="calendar-header">
      <button class="cal-nav" id="calPrev">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="cal-nav" id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Countdown -->
  <div class="card countdown-card">
    <div class="card-label">倒计时</div>
    <div id="countdownArea">
      <div class="countdown-setup">
        <input type="text" id="cdName" placeholder="事件名称，如：生日" maxlength="20">
        <input type="date" id="cdDate">
        <button class="countdown-btn" onclick="setCountdown()">开始倒计时</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ===== CLOCK =====
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').innerHTML = `${h}<span>:</span>${m}<span>:</span>${s}`;
    document.getElementById('clockDateText').textContent =
      `${now.getFullYear()}年${months[now.getMonth()]}${now.getDate()}日`;
    document.getElementById('clockWeekday').textContent = weekdays[now.getDay()];

    const hour = now.getHours();
    const greetEl = document.getElementById('greetText');
    if (hour < 6) greetEl.textContent = '夜深了 🌙';
    else if (hour < 12) greetEl.textContent = '早上好 ☀️';
    else if (hour < 14) greetEl.textContent = '中午好 🌤';
    else if (hour < 18) greetEl.textContent = '下午好 🌈';
    else greetEl.textContent = '晚上好 🌙';
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ===== WEATHER =====
  const weatherCodes = {
    0: ['☀️','晴天'], 1: ['🌤','大部晴朗'], 2: ['⛅','局部多云'], 3: ['☁️','阴天'],
    45: ['🌫','雾'], 48: ['🌫','霜雾'],
    51: ['🌦','小毛毛雨'], 53: ['🌦','毛毛雨'], 55: ['🌧','大毛毛雨'],
    61: ['🌧','小雨'], 63: ['🌧','中雨'], 65: ['🌧','大雨'],
    71: ['🌨','小雪'], 73: ['🌨','中雪'], 75: ['❄️','大雪'],
    80: ['🌦','小阵雨'], 81: ['🌧','中阵雨'], 82: ['⛈','大阵雨'],
    95: ['⛈','雷阵雨'], 96: ['⛈','雷雨夹冰雹'], 99: ['⛈','强雷雨']
  };

  async function fetchWeather() {
    try {
      const geoRes = await fetch('https://ipapi.co/json/');
      const geo = await geoRes.json();
      const { latitude: lat, longitude: lon, city, country_name } = geo;

      const wRes = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`
      );
      const w = await wRes.json();
      const cur = w.current;
      const [icon, desc] = weatherCodes[cur.weather_code] || ['🌡','未知'];

      document.getElementById('weatherContent').innerHTML = `
        <div class="weather-main">
          <div class="weather-icon">${icon}</div>
          <div class="weather-info">
            <div class="weather-temp">${Math.round(cur.temperature_2m)}<sup>°C</sup></div>
            <div class="weather-desc">${desc}</div>
            <div class="weather-meta">💧 ${cur.relative_humidity_2m}% 湿度 · 💨 ${Math.round(cur.wind_speed_10m)} km/h</div>
          </div>
        </div>
        <div class="weather-location">📍 ${city}，${country_name}</div>
      `;
    } catch(e) {
      document.getElementById('weatherContent').innerHTML =
        `<div class="weather-error">⚠️ 天气获取失败，请检查网络</div>`;
    }
  }
  fetchWeather();

  // ===== CALENDAR =====
  let calYear, calMonth;
  const now0 = new Date();
  calYear = now0.getFullYear();
  calMonth = now0.getMonth();

  function renderCalendar() {
    const today = new Date();
    document.getElementById('calTitle').textContent =
      `${calYear}年${calMonth+1}月`;
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

    const dows = ['日','一','二','三','四','五','六'];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
      const dow = (firstDay + d - 1) % 7;
      const cls = ['cal-day', isToday ? 'today' : '', dow===0 ? 'sunday' : dow===6 ? 'saturday' : ''].filter(Boolean).join(' ');
      html += `<div class="${cls}">${d}</div>`;
    }
    document.getElementById('calGrid').innerHTML = html;
  }
  renderCalendar();
  document.getElementById('calPrev').onclick = () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
  };
  document.getElementById('calNext').onclick = () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
  };

  // ===== COUNTDOWN =====
  let cdInterval = null;
  const cdKey = 'countdown_data';

  function setCountdown() {
    const name = document.getElementById('cdName').value.trim() || '倒计时';
    const dateVal = document.getElementById('cdDate').value;
    if (!dateVal) { alert('请选择日期！'); return; }
    const data = { name, date: dateVal };
    localStorage.setItem(cdKey, JSON.stringify(data));
    startCountdown(data);
  }

  function startCountdown(data) {
    if (cdInterval) clearInterval(cdInterval);
    function render() {
      const target = new Date(data.date + 'T00:00:00');
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        document.getElementById('countdownArea').innerHTML = `
          <div class="countdown-display">
            <div class="countdown-name">${data.name}</div>
            <div class="countdown-done">🎉 已到达！</div>
            <button class="countdown-reset" onclick="resetCountdown()">重新设置</button>
          </div>`;
        clearInterval(cdInterval);
        return;
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdownArea').innerHTML = `
        <div class="countdown-display">
          <div class="countdown-name">距离「${data.name}」</div>
          <div class="countdown-numbers">
            <div class="cnt-unit"><span class="cnt-val">${days}</span><span class="cnt-label">天</span></div>
            <div class="cnt-sep">·</div>
            <div class="cnt-unit"><span class="cnt-val">${String(hours).padStart(2,'0')}</span><span class="cnt-label">时</span></div>
            <div class="cnt-sep">·</div>
            <div class="cnt-unit"><span class="cnt-val">${String(mins).padStart(2,'0')}</span><span class="cnt-label">分</span></div>
            <div class="cnt-sep">·</div>
            <div class="cnt-unit"><span class="cnt-val">${String(secs).padStart(2,'0')}</span><span class="cnt-label">秒</span></div>
          </div>
          <button class="countdown-reset" onclick="resetCountdown()">重新设置</button>
        </div>`;
    }
    render();
    cdInterval = setInterval(render, 1000);
  }

  function resetCountdown() {
    if (cdInterval) clearInterval(cdInterval);
    localStorage.removeItem(cdKey);
    document.getElementById('countdownArea').innerHTML = `
      <div class="countdown-setup">
        <input type="text" id="cdName" placeholder="事件名称，如：生日" maxlength="20">
        <input type="date" id="cdDate">
        <button class="countdown-btn" onclick="setCountdown()">开始倒计时</button>
      </div>`;
  }

  // Load saved countdown
  try {
    const saved = localStorage.getItem(cdKey);
    if (saved) startCountdown(JSON.parse(saved));
  } catch(e) {}
</script>
</body>
</html>
